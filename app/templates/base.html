<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed in the browser tab -->
    <title>NHS Hospital Activity Explorer</title>

    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Navigation menu section -->
    <nav>
        <!-- Link to Home page -->
        <a href="{{ url_for('main.home') }}">Home</a>

        <!-- Link to Providers page -->
        <a href="{{ url_for('main.providers') }}">Providers</a>

        <!-- Link to Analytics page -->
        <a href="{{ url_for('main.analytics') }}">Analytics</a>

        <!-- Link to Age Analytics page -->
<a href="{{ url_for('main.age_analytics') }}">Age Analytics</a>

        <!-- Link to Compare page -->
        <a href="{{ url_for('main.compare') }}">Compare</a>
    </nav>

    <!-- Main content area -->
    <main>
        <!-- Jinja block where child templates insert content -->
        {% block content %}

        <!-- End of content block -->
        {% endblock %}
    </main>

</body>

</html>
